name: openSUSE

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  opensuse:
    strategy:
      fail-fast: false
      matrix:
        flavor: ['tumbleweed', 'leap:15.4']

    runs-on: ubuntu-latest

    container: opensuse/${{ matrix.flavor }}

    steps:
      - run: zypper update  -y
      - run: zypper install -y gcc libelf

      - uses: actions/checkout@main

      - run:  cc src/*.c -o elftool -Os -flto -Wl,-s -lelf

      - run:  ./elftool

      - run:  ./elftool --help
      - run:  ./elftool --version

      - run:  ./elftool -h
      - run:  ./elftool -V

      - run:  ./elftool print-interpreter elftool
      - run:  ./elftool print-soname elftool
      - run:  ./elftool print-needed elftool
      - run:  ./elftool print-rpath  elftool
