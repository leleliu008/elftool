name: ubuntu

on:
  push:
    branches: [ 0.15.4 ]
  pull_request:
    branches: [ 0.15.4 ]

jobs:
  vcpkg:

    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Asia/Shanghai

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ['26.04', 24.04, 22.04]

    container: ubuntu:${{ matrix.version }}

    steps:
      - run:  apt -y update
      - run:  apt -y install gcc libelf

      - uses: actions/checkout@v5

      - run:  cc src/*.c -o elftool -Os -flto -Wl,-s -lelf

      - run:  ./elftool

      - run:  ./elftool --help
      - run:  ./elftool --version

      - run:  ./elftool -h
      - run:  ./elftool -V

      - run:  ./elftool print-interpreter elftool
      - run:  ./elftool print-soname elftool
      - run:  ./elftool print-needed elftool
      - run:  ./elftool print-rpath  elftool
