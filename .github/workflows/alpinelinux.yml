name: alpinelinux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  alpinelinux:
    strategy:
      fail-fast: false
      matrix:
        tag: ['3.24', '3.23', '3.22', '3.21', '3.20', '3.19','3.18']

    runs-on: ubuntu-latest

    container: alpine:${{ matrix.tag }}

    steps:
      - uses: actions/checkout@main

      - run:  ./build.sh

      - run:  ./elftool

      - run:  ./elftool --help
      - run:  ./elftool --version

      - run:  ./elftool -h
      - run:  ./elftool -V

      - run:  ./elftool print-interpreter elftool
      - run:  ./elftool print-soname elftool
      - run:  ./elftool print-needed elftool
      - run:  ./elftool print-rpath  elftool
